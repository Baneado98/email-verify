name: Publish to npm + MCP Registry

# Push a version tag (e.g. v0.1.0) to publish the npm package and register the
# server in the Official MCP Registry. The MCP Registry uses GitHub OIDC — no
# token to manage there. npm publish needs an NPM_TOKEN repo secret (automation
# token from the email-verify npm account).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for the MCP Registry
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:engine

      # Tolerant publish: npm's account-wide rate limit (429) and "version already
      # published" must NOT fail the run (a failed run emails the repo owner).
      # We record whether the version is actually on npm and gate the registry
      # step on that, so we never email Kiran for a transient 429.
      - name: Publish package to npm (tolerant)
        id: npm
        run: |
          set +e
          out=$(npm publish --access public 2>&1); code=$?
          echo "$out"
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if [ $code -eq 0 ]; then echo "published=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          if echo "$out" | grep -qiE "cannot publish over the previously published version|You cannot publish over"; then
            echo "Already published — treating as success."; echo "published=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Check the registry directly (covers the case it landed despite an error).
          if curl -sf "https://registry.npmjs.org/$PKG/$VER" >/dev/null; then
            echo "Version present on registry — treating as success."; echo "published=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "npm publish did not succeed (likely 429 rate limit). NOT failing the run."
          echo "published=false" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        if: steps.npm.outputs.published == 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (OIDC)
        if: steps.npm.outputs.published == 'true'
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        if: steps.npm.outputs.published == 'true'
        run: ./mcp-publisher publish
